<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabTrack</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .container {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 350px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
      transform: scale(1.05);
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f1f1f1;
      margin: 8px;
      padding: 10px;
      border-radius: 8px;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<h1>🚀 LabTrack</h1>
<p>Smart Lab Inventory System</p>

<div class="container">
  <h3>Add Equipment</h3>

  <input id="name" placeholder="Name">
  <input id="serial" placeholder="Serial Number">

  <button onclick="add()">Add Equipment</button>

  <h3>Inventory</h3>
  <ul id="list"></ul>
</div>

<script>
const API = "http://localhost:8082/api/equipment";

function fetchData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      data.forEach(e => {
        const li = document.createElement("li");
        li.innerHTML = `
          <b>${e.name}</b><br>
          Serial: ${e.serialNumber}<br>
          Status: ${e.status}
        `;
        list.appendChild(li);
      });
    });
}

function add() {
  const name = document.getElementById("name").value;
  const serial = document.getElementById("serial").value;

  fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name,
      serialNumber: serial,
      category: "General",
      labLocation: "Lab1",
      quantity: 1,
      status: "Available",
      manufacturer: "NA",
      purchasePrice: 0,
      lastMaintenanceDate: "2025-01-01"
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log("Added:", data);  // 👈 check this
    fetchData();
  })
  .catch(err => console.error(err));
}
fetchData();
</script>

</body>
</html>
